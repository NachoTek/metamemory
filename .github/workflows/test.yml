name: Tests

on:
  push:
    tags: ["v*"]
  schedule:
    - cron: "0 3 * * *" # nightly at 03:00 UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -e ".[dev]"

      - run: python -m pytest -m "not slow" --tb=short -q
